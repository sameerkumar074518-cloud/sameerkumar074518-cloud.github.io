<!DOCTYPE html>
<html>
<head>
<title>Guess Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  text-align:center;
  font-family:Poppins;
  background:linear-gradient(135deg,#1f1c2c,#928dab);
  color:white;
}

.container{
  margin-top:50px;
}

input{
  padding:10px;
  font-size:18px;
  width:120px;
  text-align:center;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}

#res{
  margin-top:20px;
  font-size:20px;
}

.stats{
  margin-top:15px;
}
</style>

</head>

<body>

<div class="container">

<h1>🔢 Guess the Number</h1>

<p>Guess between 1 to 10</p>

<input id="num" type="number" min="1" max="10">
<br>

<button onclick="check()">Guess</button>

<h2 id="res"></h2>

<div class="stats">
Attempts Left: <span id="tries">5</span> <br>
🏆 Wins: <span id="score">0</span>
</div>

<button onclick="restart()">Restart</button>

</div>

<script>

let answer;
let tries;
let score = localStorage.getItem("guessWins") || 0;

document.getElementById("score").innerText = score;

function startGame(){
 answer = Math.floor(Math.random()*10)+1;
 tries = 5;
 document.getElementById("tries").innerText = tries;
 document.getElementById("res").innerText = "";
 document.getElementById("num").value = "";
}

startGame();

function check(){
 let user = Number(document.getElementById("num").value);

 if(!user || user<1 || user>10){
  document.getElementById("res").innerText = "⚠ Enter number 1-10";
  return;
 }

 if(tries <= 0) return;

 tries--;
 document.getElementById("tries").innerText = tries;

 if(user === answer){
  score++;
  localStorage.setItem("guessWins", score);
  document.getElementById("score").innerText = score;
  document.getElementById("res").innerText = "🎉 Correct!";
  return;
 }

 if(tries === 0){
  document.getElementById("res").innerText = "💀 Game Over! Answer was "+answer;
  return;
 }

 if(user > answer){
  document.getElementById("res").innerText = "⬇ Too High!";
 } else {
  document.getElementById("res").innerText = "⬆ Too Low!";
 }
}

function restart(){
 startGame();
}

</script>

</body>
</html>
