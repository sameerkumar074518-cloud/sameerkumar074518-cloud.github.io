<!DOCTYPE html>
<html>
<head>
<title>RPS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{width:100%;}

h1{margin-bottom:10px;}

.buttons button{
  padding:15px 20px;
  margin:10px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#111;
  color:white;
  transition:0.3s;
}

.buttons button:hover{
  transform:scale(1.1);
  background:#00c6ff;
  color:black;
}

.score{
  margin-top:10px;
}

.result{
  margin-top:20px;
  font-size:20px;
}

.win{color:#00e676;}
.lose{color:#ff5252;}
.draw{color:#ffd740;}

.restart{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>✂️ Rock Paper Scissors</h1>

<div class="score">
🏆 Wins: <span id="win">0</span> |
💀 Loss: <span id="loss">0</span> |
😐 Draw: <span id="draw">0</span>
</div>

<div class="buttons">
<button onclick="play('rock')">🪨 Rock</button>
<button onclick="play('paper')">📄 Paper</button>
<button onclick="play('scissors')">✂️ Scissors</button>
</div>

<div id="result" class="result"></div>

<button class="restart" onclick="resetGame()">Restart</button>

</div>

<script>

// load score
let win=localStorage.getItem("rpsWin")||0;
let loss=localStorage.getItem("rpsLoss")||0;
let draw=localStorage.getItem("rpsDraw")||0;

updateScore();

function updateScore(){
 document.getElementById("win").innerText=win;
 document.getElementById("loss").innerText=loss;
 document.getElementById("draw").innerText=draw;
}

function play(user){

 document.getElementById("result").innerText="🤖 Computer is thinking...";

 setTimeout(()=>{
  let comp=["rock","paper","scissors"][Math.floor(Math.random()*3)];

  let res="", cls="";

  if(user===comp){
    draw++;
    res="😐 Draw!";
    cls="draw";
  }
  else if(
    (user=="rock"&&comp=="scissors")||
    (user=="paper"&&comp=="rock")||
    (user=="scissors"&&comp=="paper")
  ){
    win++;
    res="🔥 You Win!";
    cls="win";
  }
  else{
    loss++;
    res="💀 You Lose!";
    cls="lose";
  }

  localStorage.setItem("rpsWin",win);
  localStorage.setItem("rpsLoss",loss);
  localStorage.setItem("rpsDraw",draw);

  updateScore();

  document.getElementById("result").className="result "+cls;
  document.getElementById("result").innerText=
   "You: "+user.toUpperCase()+" | AI: "+comp.toUpperCase()+" → "+res;

 },500);
}

// reset without reload
function resetGame(){
 win=0; loss=0; draw=0;
 localStorage.clear();
 updateScore();
 document.getElementById("result").innerText="";
}

</script>

</body>
</html>
