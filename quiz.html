<!DOCTYPE html>
<html>
<head>
<title>Quiz Zone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

h1{
  margin-top:20px;
  text-shadow:0 0 10px cyan;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:15px;
  transition:0.3s;
  cursor:pointer;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px cyan;
}

#quizBox{
  display:none;
  margin-top:20px;
}

.options button{
  display:block;
  width:80%;
  margin:10px auto;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  background:#111;
  color:white;
}

.options button:hover{
  background:#00c6ff;
  color:black;
}

.correct{background:#00e676 !important;}
.wrong{background:#ff5252 !important;}

#timer{
  margin-top:10px;
}

button.restart{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>

</head>

<body>

<h1>🔥 Quiz Zone</h1>
<p>Select a category 👇</p>

<div class="container">
  <div class="card" onclick="startQuiz('football')">⚽ Football</div>
  <div class="card" onclick="startQuiz('cricket')">🏏 Cricket</div>
  <div class="card" onclick="startQuiz('coding')">💻 Coding</div>
  <div class="card" onclick="startQuiz('gk')">🌍 GK</div>
  <div class="card" onclick="startQuiz('movies')">🎬 Movies</div>
  <div class="card" onclick="startQuiz('anime')">🔥 Anime</div>
</div>

<div id="quizBox">
  <h2 id="question"></h2>

  <div class="options">
    <button id="opt0" onclick="answer(0)"></button>
    <button id="opt1" onclick="answer(1)"></button>
    <button id="opt2" onclick="answer(2)"></button>
  </div>

  <h3 id="timer">⏱ 10</h3>
  <h2 id="result"></h2>

  <button class="restart" onclick="restart()">Restart</button>
</div>

<script>

// QUESTIONS (same as yours)
let quizData={
football:[
{q:"FIFA 2022 winner?",o:["Brazil","Argentina","France"],a:1},
{q:"Most UCL titles?",o:["Barca","Real Madrid","Bayern"],a:1},
{q:"GOAT?",o:["Messi","Ronaldo","Neymar"],a:0},
{q:"Ronaldo country?",o:["Spain","Portugal","Brazil"],a:1},
{q:"Ballon d'Or 2023?",o:["Messi","Haaland","Mbappe"],a:0},
{q:"2014 WC host?",o:["Brazil","Germany","Russia"],a:0},
{q:"Man Utd stadium?",o:["Old Trafford","Anfield","Emirates"],a:0},
{q:"PSG star?",o:["Mbappe","Zidane","Iniesta"],a:0},
{q:"Euro 2020 winner?",o:["Italy","France","Spain"],a:0},
{q:"Barcelona stadium?",o:["Camp Nou","Bernabeu","Allianz"],a:0}
],

cricket:[
{q:"2011 WC captain?",o:["Dhoni","Kohli","Rohit"],a:0},
{q:"Fastest 100?",o:["ABD","Gayle","Kohli"],a:0},
{q:"God of cricket?",o:["Sachin","Ponting","Lara"],a:0},
{q:"CSK captain?",o:["Dhoni","Raina","Jadeja"],a:0},
{q:"Most WC wins?",o:["India","Aus","Eng"],a:1},
{q:"Kohli role?",o:["Bowler","Batsman","Keeper"],a:1},
{q:"T20 overs?",o:["20","50","10"],a:0},
{q:"First WC winner?",o:["WI","India","Aus"],a:0},
{q:"Wankhede is in?",o:["Mumbai","Delhi","Chennai"],a:0},
{q:"Yorker bowled by?",o:["Fast","Spin","Keeper"],a:0}
],

// (rest same)
};

// LOGIC
let current=[],i=0,score=0,timer,time=10;

function startQuiz(type){
 document.querySelector(".container").style.display="none";
 quizBox.style.display="block";

 // 🔥 ONLY CHANGE: shuffle questions
 current = [...quizData[type]].sort(()=>Math.random()-0.5);

 i=0; score=0;

 loadQ();
}

function loadQ(){
 let q=current[i];
 question.innerText=`Q${i+1}. ${q.q}`;
 opt0.innerText=q.o[0];
 opt1.innerText=q.o[1];
 opt2.innerText=q.o[2];

 time=10;
 startTimer();
}

function startTimer(){
 clearInterval(timer);
 timer=setInterval(()=>{
  time--;
  document.getElementById("timer").innerText="⏱ "+time;
  if(time==0){
   nextQ();
  }
 },1000);
}

function answer(c){
 clearInterval(timer);

 if(c==current[i].a){
  score++;
  event.target.classList.add("correct");
 } else {
  event.target.classList.add("wrong");
 }

 setTimeout(nextQ,500);
}

function nextQ(){
 i++;
 document.querySelectorAll(".options button").forEach(b=>{
  b.classList.remove("correct","wrong");
 });

 if(i<current.length){
  loadQ();
 } else {
  let percent=Math.round((score/current.length)*100);
  result.innerText=`🔥 Score: ${score}/${current.length} (${percent}%)`;
  clearInterval(timer);
 }
}

function restart(){
 location.reload();
}

</script>

</body>
</html>
