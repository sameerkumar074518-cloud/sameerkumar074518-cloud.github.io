<!DOCTYPE html>
<html>
<head>
<title>Memory</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 text-align:center;
 font-family:Poppins;
 background:linear-gradient(135deg,#232526,#414345);
 color:white;
}

h1{margin-top:10px;}

#grid{
 display:grid;
 grid-template-columns:repeat(3,90px);
 gap:10px;
 justify-content:center;
 margin-top:20px;
}

.card{
 width:90px;height:90px;
 background:#111;
 border-radius:10px;
 font-size:30px;
 display:flex;
 justify-content:center;
 align-items:center;
 cursor:pointer;
 transition:0.2s;
}

.card:hover{transform:scale(1.05);}

.flipped{
 background:#00c6ff;
 color:black;
}

.matched{
 background:#00e676;
 color:black;
}

.controls{
 margin-top:20px;
}
</style>

</head>

<body>

<h1>🧠 Memory Game</h1>

<h3>Moves: <span id="moves">0</span></h3>
<h3>⏱ Time: <span id="time">0</span>s</h3>

<div id="grid"></div>

<div class="controls">
<button onclick="restart()">Restart</button>
</div>

<script>

let values=["A","A","B","B","C","C"];
let grid=document.getElementById("grid");

let first=null;
let second=null;
let lock=false;

let moves=0;
let time=0;
let timer;

// SHUFFLE
values.sort(()=>0.5-Math.random());

// TIMER
timer=setInterval(()=>{
 time++;
 document.getElementById("time").innerText=time;
},1000);

// CREATE CARDS
values.forEach(val=>{
 let d=document.createElement("div");
 d.className="card";
 d.dataset.value=val;
 d.innerText="?";

 d.onclick=()=>flip(d);

 grid.appendChild(d);
});

// FLIP LOGIC
function flip(card){

 if(lock || card.classList.contains("matched") || card===first) return;

 card.innerText=card.dataset.value;
 card.classList.add("flipped");

 if(!first){
  first=card;
 }
 else{
  second=card;
  moves++;
  document.getElementById("moves").innerText=moves;

  if(first.dataset.value===second.dataset.value){
   first.classList.add("matched");
   second.classList.add("matched");

   first=null;
   second=null;

   checkWin();
  }
  else{
   lock=true;
   setTimeout(()=>{
    first.innerText="?";
    second.innerText="?";
    first.classList.remove("flipped");
    second.classList.remove("flipped");
    first=null;
    second=null;
    lock=false;
   },700);
  }
 }
}

// WIN CHECK
function checkWin(){
 let allMatched=[...document.querySelectorAll(".card")]
  .every(c=>c.classList.contains("matched"));

 if(allMatched){
  clearInterval(timer);
  setTimeout(()=>{
   alert("🎉 You Win!\nMoves: "+moves+" | Time: "+time+"s");
  },300);
 }
}

// RESTART
function restart(){
 location.reload();
}

</script>

</body>
</html>
