<!DOCTYPE html>
<html>
<head>
<title>Aim Trainer PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:#0f172a;color:white;text-align:center;font-family:Poppins;}
canvas{display:block;margin:auto;background:#020617;border-radius:10px;}
button{margin-top:10px;padding:10px 20px;border:none;background:red;color:white;border-radius:8px;}
</style>
</head>
<body>

<h2>🎯 Aim Trainer PRO</h2>
<h3>Score: <span id="score">0</span></h3>
<canvas id="game" width="400" height="500"></canvas>
<button onclick="restart()">Restart</button>

<script>
let c=game, ctx=c.getContext("2d");
let score, radius, target;

function init(){
 score=0;
 radius=25;
 target={x:200,y:200};
 document.getElementById("score").innerText=0;
 spawn();
}

function spawn(){
 target.x=Math.random()*350+25;
 target.y=Math.random()*450+25;
}

c.onclick=e=>{
 let r=c.getBoundingClientRect();
 let x=e.clientX-r.left;
 let y=e.clientY-r.top;

 let d=Math.hypot(x-target.x,y-target.y);
 if(d<radius){
  score++;
  document.getElementById("score").innerText=score;
  radius=Math.max(10,radius-0.5);
  spawn();
 }
};

function draw(){
 ctx.clearRect(0,0,400,500);

 let g=ctx.createRadialGradient(target.x,target.y,5,target.x,target.y,radius);
 g.addColorStop(0,"#ff4d4d");
 g.addColorStop(1,"transparent");

 ctx.fillStyle=g;
 ctx.beginPath();
 ctx.arc(target.x,target.y,radius,0,Math.PI*2);
 ctx.fill();

 requestAnimationFrame(draw);
}

function restart(){
 init();
}

init();
draw();
</script>
</body>
</html>
