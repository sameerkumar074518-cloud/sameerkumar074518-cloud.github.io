<!DOCTYPE html>
<html>
<head>
<title>Beat Tap PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:#000;overflow:hidden;color:white;text-align:center;font-family:Poppins;}
#score{position:fixed;top:10px;width:100%;}
.beat{
 width:60px;height:60px;
 background:cyan;
 position:absolute;
 left:50%;
 transform:translateX(-50%);
 border-radius:10px;
}
#hitZone{
 position:fixed;
 bottom:100px;
 width:100%;
 height:5px;
 background:red;
}
</style>
</head>
<body>

<h2 id="score">Score: 0</h2>
<div id="hitZone"></div>

<script>
let score=0;

function spawn(){
 let b=document.createElement("div");
 b.className="beat";
 b.style.top="0px";
 document.body.appendChild(b);

 let fall=setInterval(()=>{
  let y=b.offsetTop+5;
  b.style.top=y+"px";

  if(y>window.innerHeight){
   b.remove();
   clearInterval(fall);
  }
 },20);

 b.onclick=()=>{
  if(b.offsetTop > window.innerHeight-150){
   score+=10;
   document.getElementById("score").innerText="Score: "+score;
   b.remove();
   clearInterval(fall);
  }
 };
}

setInterval(spawn,1200);
</script>

</body>
</html>
