<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe AI</title>

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{text-align:center;}

#board{
  display:grid;
  grid-template-columns:repeat(3,90px);
  gap:10px;
  margin:20px;
}

button{
  height:90px;
  font-size:30px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#00c6ff;
}

.win{
  background:#00ff99 !important;
}

.controls button{
  height:auto;
  padding:10px 15px;
  font-size:16px;
  margin:5px;
}
</style>

</head>

<body>

<div class="container">
<h1>❌⭕ Tic Tac Toe (AI)</h1>

<h2>
🏆 Wins: <span id="wins">0</span> |
💀 Loss: <span id="loss">0</span> |
😐 Draw: <span id="draw">0</span>
</h2>

<div id="board"></div>

<h2 id="status"></h2>

<div class="controls">
<button onclick="location.reload()">Restart</button>
<button onclick="resetScore()">Reset Score</button>
</div>

</div>

<script>
let board=["","","","","","","","",""];
let gameOver=false;

// SCORE SYSTEM
let wins=parseInt(localStorage.getItem("wins"))||0;
let loss=parseInt(localStorage.getItem("loss"))||0;
let draw=parseInt(localStorage.getItem("draw"))||0;

updateUI();

function updateUI(){
 document.getElementById("wins").innerText=wins;
 document.getElementById("loss").innerText=loss;
 document.getElementById("draw").innerText=draw;
}

function saveScore(){
 localStorage.setItem("wins",wins);
 localStorage.setItem("loss",loss);
 localStorage.setItem("draw",draw);
}

// RESET SCORE
function resetScore(){
 localStorage.clear();
 location.reload();
}

// CREATE BOARD
let boardDiv=document.getElementById("board");

for(let i=0;i<9;i++){
 let btn=document.createElement("button");

 btn.onclick=function(){
  if(board[i]==""&&!gameOver){
   board[i]="X";
   btn.innerText="X";

   if(checkWin(board,"X")) return;

   computerMove();
  }
 };

 boardDiv.appendChild(btn);
}

// AI MOVE (MINIMAX)
function computerMove(){
 let bestScore=-Infinity;
 let move;

 for(let i=0;i<9;i++){
  if(board[i]==""){
   board[i]="O";
   let score=minimax(board,false);
   board[i]="";
   if(score>bestScore){
    bestScore=score;
    move=i;
   }
  }
 }

 board[move]="O";
 boardDiv.children[move].innerText="O";

 checkWin(board,"O");
}

// MINIMAX
function minimax(newBoard,isMax){
 let result=getResult(newBoard);
 if(result!==null) return result;

 if(isMax){
  let best=-Infinity;
  for(let i=0;i<9;i++){
   if(newBoard[i]==""){
    newBoard[i]="O";
    let score=minimax(newBoard,false);
    newBoard[i]="";
    best=Math.max(score,best);
   }
  }
  return best;
 } else {
  let best=Infinity;
  for(let i=0;i<9;i++){
   if(newBoard[i]==""){
    newBoard[i]="X";
    let score=minimax(newBoard,true);
    newBoard[i]="";
    best=Math.min(score,best);
   }
  }
  return best;
 }
}

// RESULT CHECK
function getResult(b){
 if(checkWinSimple(b,"O")) return 1;
 if(checkWinSimple(b,"X")) return -1;
 if(!b.includes("")) return 0;
 return null;
}

// SIMPLE WIN CHECK (for AI)
function checkWinSimple(b,p){
 let w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
 return w.some(c=>b[c[0]]==p&&b[c[1]]==p&&b[c[2]]==p);
}

// MAIN WIN CHECK
function checkWin(b,p){
 let w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

 for(let c of w){
  if(b[c[0]]==p&&b[c[1]]==p&&b[c[2]]==p){

   highlight(c);

   if(p=="X"){
    wins++;
    document.getElementById("status").innerText="🎉 You Win!";
   } else {
    loss++;
    document.getElementById("status").innerText="🤖 AI Wins!";
   }

   saveScore();
   updateUI();
   gameOver=true;
   return true;
  }
 }

 if(!b.includes("")){
  draw++;
  document.getElementById("status").innerText="😐 Draw!";
  saveScore();
  updateUI();
  gameOver=true;
 }

 return false;
}

// HIGHLIGHT
function highlight(cells){
 cells.forEach(i=>{
  boardDiv.children[i].classList.add("win");
 });
}
</script>

</body>
</html>
