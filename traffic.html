<!DOCTYPE html>
<html>
<head>
<title>Traffic Racer PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 background:#111;
 overflow:hidden;
 font-family:Poppins;
 color:white;
 text-align:center;
}

/* ROAD */
#road{
 position:fixed;
 width:100%;
 height:100%;
 background:linear-gradient(#222,#111);
}

/* CAR */
#car{
 width:50px;
 height:80px;
 background:linear-gradient(to bottom, #00ffcc, #009999);
 border-radius:10px;
 position:absolute;
 bottom:20px;
 left:45%;
}

/* ENEMY */
.enemy{
 width:50px;
 height:80px;
 background:linear-gradient(to bottom, red, darkred);
 border-radius:10px;
 position:absolute;
}

/* STATS */
#stats{
 position:fixed;
 top:10px;
 width:100%;
 display:flex;
 justify-content:space-around;
 font-size:18px;
}

/* BUTTONS */
.controls{
 position:fixed;
 bottom:20px;
 width:100%;
 display:flex;
 justify-content:space-around;
}

button{
 padding:15px 25px;
 border:none;
 border-radius:10px;
 background:#ff416c;
 color:white;
 font-size:18px;
}

/* GAME OVER */
#gameOver{
 display:none;
 position:fixed;
 top:40%;
 width:100%;
}
</style>

</head>

<body>

<div id="road"></div>

<div id="stats">
 <div>Score: <span id="score">0</span></div>
 <div>🏆 High: <span id="high">0</span></div>
 <div>💰 Coins: <span id="coins">0</span></div>
</div>

<div id="car"></div>

<div class="controls">
 <button onclick="moveLeft()">⬅️</button>
 <button onclick="moveRight()">➡️</button>
</div>

<div id="gameOver">
 <h2>💥 Crash!</h2>
 <button onclick="restart()">Restart</button>
</div>

<script>
let car=document.getElementById("car");
let lane=1;
let lanes=[20,45,70];

let score=0;
let coins=0;
let speed=5;
let gameRunning=true;

/* HIGH SCORE */
let highScore=localStorage.getItem("trafficHigh") || 0;
document.getElementById("high").innerText=highScore;

/* MOVE CAR */
function moveCar(){
 car.style.left=lanes[lane]+"%";
}

function moveLeft(){
 if(lane>0){
  lane--;
  moveCar();
 }
}

function moveRight(){
 if(lane<2){
  lane++;
  moveCar();
 }
}

/* PC SUPPORT */
document.addEventListener("keydown",(e)=>{
 if(e.key==="ArrowLeft") moveLeft();
 if(e.key==="ArrowRight") moveRight();
});

/* SPAWN ENEMY */
function spawn(){
 if(!gameRunning) return;

 let e=document.createElement("div");
 e.className="enemy";
 let l=Math.floor(Math.random()*3);
 e.style.left=lanes[l]+"%";
 e.style.top="0px";
 document.body.appendChild(e);

 let move=setInterval(()=>{
  let y=e.offsetTop+speed;
  e.style.top=y+"px";

  /* SCORE */
  if(y>window.innerHeight){
   e.remove();
   clearInterval(move);

   score++;
   coins++;
   document.getElementById("score").innerText=score;
   document.getElementById("coins").innerText=coins;

   /* INCREASE DIFFICULTY */
   if(score%5===0) speed+=0.5;
  }

  /* COLLISION */
  if(l===lane && y>window.innerHeight-120){
   endGame();
  }

 },20);
}

let gameLoop=setInterval(spawn,1200);

/* END GAME */
function endGame(){
 gameRunning=false;

 /* SAVE HIGH SCORE */
 if(score>highScore){
  localStorage.setItem("trafficHigh",score);
 }

 document.getElementById("gameOver").style.display="block";
}

/* RESTART */
function restart(){
 location.reload();
}
</script>

</body>
</html>
