<!DOCTYPE html>
<html>
<head>
<title>Stack Tower PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 background:#111;
 overflow:hidden;
 font-family:Poppins;
 color:white;
 text-align:center;
}

/* GAME AREA */
#game{
 position:relative;
 width:100%;
 height:100vh;
 overflow:hidden;
}

/* BLOCK */
.block{
 position:absolute;
 height:30px;
 border-radius:6px;
 background:linear-gradient(45deg,#00f2fe,#4facfe);
 box-shadow:0 4px 10px rgba(0,0,0,0.6);
}

/* HUD */
#hud{
 position:fixed;
 top:10px;
 width:100%;
 display:flex;
 justify-content:space-around;
 font-size:18px;
}

/* BUTTON */
#dropBtn{
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 padding:15px 30px;
 font-size:18px;
 background:#ff416c;
 border:none;
 border-radius:10px;
 color:white;
}

/* GAME OVER */
#gameOver{
 display:none;
 position:fixed;
 top:40%;
 width:100%;
}
</style>
</head>

<body>

<div id="hud">
 <div>Score: <span id="score">0</span></div>
 <div>🏆 High: <span id="high">0</span></div>
 <div>💰 Coins: <span id="coins">0</span></div>
</div>

<div id="game"></div>

<button id="dropBtn">DROP</button>

<div id="gameOver">
 <h2>💥 Game Over</h2>
 <button onclick="restart()">Restart</button>
</div>

<script>
let game=document.getElementById("game");

/* BASE BLOCK (IMPORTANT FIX) */
let base=document.createElement("div");
base.className="block";
base.style.width="200px";
base.style.left=(window.innerWidth/2-100)+"px";
base.style.bottom="0px";
game.appendChild(base);

let width=200;
let x=0;
let dir=1;
let y=30;

let score=0;
let coins=0;
let speed=3;
let gameRunning=true;

/* HIGH SCORE */
let highScore=localStorage.getItem("stackHigh") || 0;
document.getElementById("high").innerText=highScore;

/* CURRENT BLOCK */
let current=createBlock();

/* CREATE BLOCK */
function createBlock(){
 let b=document.createElement("div");
 b.className="block";
 b.style.width=width+"px";
 b.style.left="0px";
 b.style.bottom=y+"px";
 game.appendChild(b);
 return b;
}

/* MOVE */
function move(){
 if(!gameRunning) return;

 x+=dir*speed;

 if(x<0 || x>window.innerWidth-width){
  dir*=-1;
 }

 current.style.left=x+"px";

 requestAnimationFrame(move);
}
move();

/* DROP */
document.getElementById("dropBtn").onclick=drop;

function drop(){
 if(!gameRunning) return;

 let blocks=document.querySelectorAll(".block");
 let prev=blocks[blocks.length-2];

 let overlap=Math.min(x+width, prev.offsetLeft+prev.offsetWidth) - Math.max(x, prev.offsetLeft);

 if(overlap<=0){
  endGame();
  return;
 }

 /* PERFECT SNAP */
 if(overlap>width-8){
  overlap=width;
 }

 width=overlap;

 score++;
 coins++;

 document.getElementById("score").innerText=score;
 document.getElementById("coins").innerText=coins;

 /* ALIGN BLOCK */
 let newLeft=Math.max(x, prev.offsetLeft);

 y+=30;

 current=createBlock();
 current.style.width=width+"px";
 current.style.left=newLeft+"px";

 x=newLeft;

 /* SPEED INCREASE */
 if(score%5===0) speed+=0.5;
}

/* GAME OVER */
function endGame(){
 gameRunning=false;

 if(score>highScore){
  localStorage.setItem("stackHigh",score);
 }

 document.getElementById("gameOver").style.display="block";
}

/* RESTART */
function restart(){
 location.reload();
}
</script>

</body>
</html>
