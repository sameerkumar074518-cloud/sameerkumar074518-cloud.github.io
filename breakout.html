<!DOCTYPE html>
<html>
<head>
<title>Breakout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  text-align:center;
  background:linear-gradient(135deg,#000428,#004e92);
  color:white;
  font-family:Poppins, sans-serif;
}

h1{margin:10px 0;}

canvas{
  background:#111;
  border:2px solid #fff;
  border-radius:10px;
  touch-action:none;
}

.hud{
  margin-top:6px;
}

.controls{
  margin-top:10px;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin:4px;
}
</style>
</head>

<body>

<h1>🧱 Breakout</h1>

<canvas id="game" width="400" height="400"></canvas>

<div class="hud">
  🏆 Score: <span id="score">0</span> |
  ❤️ Lives: <span id="lives">3</span>
</div>

<div id="msg"></div>

<div class="controls">
  <button onclick="startGame()">Start</button>
  <button onclick="restart()">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let running = false;

// BALL
let ball = {x:200, y:250, dx:3, dy:-3, r:8};

// PADDLE
let paddle = {x:150, y:370, w:100, h:10, speed:6};

// BRICKS
const rows = 4, cols = 5;
let bricks = [];
const bw = 70, bh = 20, gap = 10, offX = 10, offY = 40;

function makeBricks(){
  bricks = [];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      bricks.push({
        x: c*(bw+gap)+offX,
        y: r*(bh+gap)+offY,
        alive:true
      });
    }
  }
}

// SCORE / LIVES
let score = 0;
let lives = 3;

function updateHUD(){
  document.getElementById("score").innerText = score;
  document.getElementById("lives").innerText = lives;
}

// CONTROLS (mouse + keyboard + touch)
let left=false, right=false;

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft") left=true;
  if(e.key==="ArrowRight") right=true;
});

document.addEventListener("keyup", e=>{
  if(e.key==="ArrowLeft") left=false;
  if(e.key==="ArrowRight") right=false;
});

canvas.addEventListener("mousemove", e=>{
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  paddle.x = x - paddle.w/2;
});

// touch
canvas.addEventListener("touchmove", e=>{
  const rect = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left;
  paddle.x = x - paddle.w/2;
}, {passive:true});

// GAME LOOP
function loop(){
  if(!running) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // move paddle (keyboard)
  if(left) paddle.x -= paddle.speed;
  if(right) paddle.x += paddle.speed;

  // clamp paddle
  if(paddle.x < 0) paddle.x = 0;
  if(paddle.x + paddle.w > canvas.width) paddle.x = canvas.width - paddle.w;

  // draw paddle
  ctx.fillStyle="#fff";
  ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

  // draw ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fillStyle="#00e5ff";
  ctx.fill();
  ctx.closePath();

  // bricks
  bricks.forEach(b=>{
    if(!b.alive) return;
    ctx.fillStyle="#ffca28";
    ctx.fillRect(b.x, b.y, bw, bh);

    // collision ball-brick
    if(ball.x > b.x && ball.x < b.x + bw &&
       ball.y - ball.r < b.y + bh && ball.y + ball.r > b.y){
      b.alive = false;
      ball.dy *= -1;
      score++;
      updateHUD();
    }
  });

  // win check
  if(bricks.every(b=>!b.alive)){
    end("🎉 You Win!");
    return;
  }

  // ball movement
  ball.x += ball.dx;
  ball.y += ball.dy;

  // wall collision
  if(ball.x - ball.r < 0 || ball.x + ball.r > canvas.width){
    ball.dx *= -1;
  }
  if(ball.y - ball.r < 0){
    ball.dy *= -1;
  }

  // paddle collision
  if(ball.y + ball.r >= paddle.y &&
     ball.x >= paddle.x &&
     ball.x <= paddle.x + paddle.w){
    ball.dy *= -1;

    // add a bit of control based on hit position
    let hit = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
    ball.dx = 4 * hit;
  }

  // bottom (lose life)
  if(ball.y - ball.r > canvas.height){
    lives--;
    updateHUD();

    if(lives <= 0){
      end("💀 Game Over");
      return;
    }else{
      // reset ball
      ball.x = 200;
      ball.y = 250;
      ball.dx = 3;
      ball.dy = -3;
    }
  }

  requestAnimationFrame(loop);
}

// START / END / RESTART
function startGame(){
  if(running) return;
  running = true;
  document.getElementById("msg").innerText = "";
  requestAnimationFrame(loop);
}

function end(text){
  running = false;
  document.getElementById("msg").innerText = text;
}

function restart(){
  running = false;
  score = 0;
  lives = 3;
  updateHUD();

  ball = {x:200, y:250, dx:3, dy:-3, r:8};
  paddle = {x:150, y:370, w:100, h:10, speed:6};

  makeBricks();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  document.getElementById("msg").innerText = "";
}

// init
makeBricks();
updateHUD();
</script>

</body>
</html>
