<!DOCTYPE html>
<html>
<head>
<title>Flappy Bird PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  text-align:center;
  font-family:Poppins;
  background:linear-gradient(#87CEEB,#6ec6ff);
}

/* GAME AREA */
#gameContainer{
  position:relative;
  margin:auto;
  width:400px;
}

canvas{
  background:transparent;
  border-radius:10px;
}

/* TOP BAR */
.topBar{
  position:absolute;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:10px;
  color:white;
  font-weight:bold;
}

/* GAME OVER */
#gameOver{
  display:none;
  position:absolute;
  top:40%;
  width:100%;
  text-align:center;
  color:white;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* MOBILE BUTTON */
#jumpBtn{
  margin-top:20px;
  width:200px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>🐦 Flappy Bird PRO</h1>

<div id="gameContainer">
  <div class="topBar">
    <div>Score: <span id="score">0</span></div>
    <div>🏆 <span id="high">0</span></div>
  </div>

  <canvas id="game" width="400" height="600"></canvas>

  <div id="gameOver">
    <h2 id="final"></h2>
    <button onclick="restart()">Restart</button>
  </div>
</div>

<button id="jumpBtn">⬆ Jump</button>

<script>
let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

/* GAME STATE */
let birdY=300;
let velocity=0;
let gravity=0.4;
let jumpPower=-8;

let pipes=[];
let score=0;
let gameRunning=true;

/* HIGH SCORE */
let highScore=localStorage.getItem("flappyHigh")||0;
document.getElementById("high").innerText=highScore;

/* DIFFICULTY */
let speed=2;
let gap=200;

/* AFTER SOME TIME → HARDER */
setTimeout(()=>{
 speed=3;
 gap=170;
},8000);

setTimeout(()=>{
 speed=4;
 gap=150;
},16000);

/* JUMP FUNCTION */
function jump(){
 if(!gameRunning) return;
 velocity = jumpPower;
}

/* INPUTS */
document.addEventListener("keydown",e=>{
 if(e.code==="Space") jump();
});

document.getElementById("jumpBtn").addEventListener("click",jump);

/* TOUCH ANYWHERE */
canvas.addEventListener("touchstart",(e)=>{
 e.preventDefault();
 jump();
},{passive:false});

/* CLICK ALSO */
canvas.addEventListener("mousedown",jump);

/* CLOUDS */
let clouds=[];
for(let i=0;i<3;i++){
 clouds.push({x:Math.random()*400,y:Math.random()*200});
}

/* GAME LOOP */
function gameLoop(){

 if(!gameRunning) return;

 ctx.clearRect(0,0,400,600);

 /* SKY */
 let sky=ctx.createLinearGradient(0,0,0,600);
 sky.addColorStop(0,"#87CEEB");
 sky.addColorStop(1,"#dff6ff");
 ctx.fillStyle=sky;
 ctx.fillRect(0,0,400,600);

 /* CLOUDS */
 ctx.fillStyle="white";
 clouds.forEach(c=>{
   ctx.beginPath();
   ctx.arc(c.x,c.y,20,0,Math.PI*2);
   ctx.arc(c.x+25,c.y+10,20,0,Math.PI*2);
   ctx.fill();

   c.x-=0.5;
   if(c.x<-50) c.x=450;
 });

 /* BIRD */
 velocity+=gravity;
 birdY+=velocity;

 ctx.fillStyle="yellow";
 ctx.beginPath();
 ctx.arc(80,birdY,12,0,Math.PI*2);
 ctx.fill();

 /* PIPES */
 if(pipes.length==0 || pipes[pipes.length-1].x<250){
   let top=Math.random()*250+50;
   pipes.push({x:400, top:top});
 }

 ctx.fillStyle="green";

 pipes.forEach(p=>{
   p.x-=speed;

   ctx.fillRect(p.x,0,60,p.top);
   ctx.fillRect(p.x,p.top+gap,60,600);

   /* SCORE */
   if(p.x===80){
     score++;
     document.getElementById("score").innerText=score;
   }

   /* COLLISION */
   if(
     80+12 > p.x && 80-12 < p.x+60 &&
     (birdY-12 < p.top || birdY+12 > p.top+gap)
   ){
     endGame();
   }
 });

 /* OUT OF SCREEN */
 if(birdY<0 || birdY>600){
   endGame();
 }

 pipes=pipes.filter(p=>p.x>-60);

 requestAnimationFrame(gameLoop);
}

/* END GAME */
function endGame(){
 gameRunning=false;

 if(score>highScore){
   localStorage.setItem("flappyHigh",score);
 }

 document.getElementById("final").innerText="Score: "+score;
 document.getElementById("gameOver").style.display="block";
}

/* RESTART */
function restart(){
 location.reload();
}

/* START */
gameLoop();
</script>

</body>
</html>
