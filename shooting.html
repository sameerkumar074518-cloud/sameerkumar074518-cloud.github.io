<!DOCTYPE html>
<html>
<head>
<title>Shooting Arena PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 background:#0f172a;
 overflow:hidden;
 font-family:Poppins;
 color:white;
}

/* HUD */
#hud{
 position:fixed;
 top:10px;
 width:100%;
 display:flex;
 justify-content:space-around;
 font-size:18px;
}

/* ENEMY */
.enemy{
 width:60px;
 height:60px;
 border-radius:50%;
 background:radial-gradient(circle, red, darkred);
 position:absolute;
 box-shadow:0 0 15px red;
}

/* CROSSHAIR */
#crosshair{
 position:fixed;
 width:40px;
 height:40px;
 border:2px solid white;
 border-radius:50%;
 pointer-events:none;
 transform:translate(-50%,-50%);
}

/* GAME OVER */
#gameOver{
 display:none;
 position:fixed;
 top:40%;
 width:100%;
 text-align:center;
}

/* BUTTON */
button{
 padding:12px 20px;
 border:none;
 border-radius:10px;
 background:#ff416c;
 color:white;
 font-size:16px;
 margin-top:10px;
}
</style>

</head>

<body>

<div id="hud">
 <div>Score: <span id="score">0</span></div>
 <div>🏆 High: <span id="high">0</span></div>
 <div>💰 Coins: <span id="coins">0</span></div>
 <div>❤️ Lives: <span id="lives">3</span></div>
</div>

<div id="crosshair"></div>

<div id="gameOver">
 <h2>💥 Game Over</h2>
 <button onclick="restart()">Restart</button>
</div>

<script>
let score=0;
let coins=0;
let lives=3;
let speed=2;
let gameRunning=true;

/* HIGH SCORE */
let highScore=localStorage.getItem("shootHigh") || 0;
document.getElementById("high").innerText=highScore;

/* CROSSHAIR FOLLOW */
document.addEventListener("mousemove",e=>{
 document.getElementById("crosshair").style.left=e.clientX+"px";
 document.getElementById("crosshair").style.top=e.clientY+"px";
});

document.addEventListener("touchmove",e=>{
 let t=e.touches[0];
 document.getElementById("crosshair").style.left=t.clientX+"px";
 document.getElementById("crosshair").style.top=t.clientY+"px";
});

/* SPAWN ENEMY */
function spawn(){
 if(!gameRunning) return;

 let e=document.createElement("div");
 e.className="enemy";
 e.style.top=Math.random()*(window.innerHeight-60)+"px";
 e.style.left="0px";
 document.body.appendChild(e);

 let move=setInterval(()=>{
  let x=e.offsetLeft+speed;
  e.style.left=x+"px";

  /* MISS */
  if(x>window.innerWidth){
   e.remove();
   clearInterval(move);

   lives--;
   document.getElementById("lives").innerText=lives;

   if(lives<=0) endGame();
  }

 },20);

 /* HIT */
 e.onclick=()=>{
  score++;
  coins++;

  document.getElementById("score").innerText=score;
  document.getElementById("coins").innerText=coins;

  e.remove();
  clearInterval(move);

  /* INCREASE DIFFICULTY */
  if(score%5===0) speed+=0.5;
 };
}

setInterval(spawn,1000);

/* END GAME */
function endGame(){
 gameRunning=false;

 if(score>highScore){
  localStorage.setItem("shootHigh",score);
 }

 document.getElementById("gameOver").style.display="block";
}

/* RESTART */
function restart(){
 location.reload();
}
</script>

</body>
</html>
