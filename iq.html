<!DOCTYPE html>
<html>
<head>
<title>IQ Challenge PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:Poppins;
 background:#0f172a;
 color:white;
 text-align:center;
}

/* CONTAINER */
#game{
 margin-top:50px;
}

/* CARD */
.card{
 background:#1e293b;
 margin:20px;
 padding:20px;
 border-radius:15px;
 box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* OPTIONS */
button{
 display:block;
 width:80%;
 margin:10px auto;
 padding:15px;
 font-size:18px;
 border:none;
 border-radius:10px;
 background:#ff416c;
 color:white;
}

/* HUD */
#hud{
 display:flex;
 justify-content:space-around;
 margin-top:10px;
}

/* GAME OVER */
#gameOver{
 display:none;
 margin-top:40px;
}
</style>

</head>

<body>

<h2>🧠 IQ Challenge PRO</h2>

<div id="hud">
 <div>Score: <span id="score">0</span></div>
 <div>🏆 High: <span id="high">0</span></div>
 <div>💰 Coins: <span id="coins">0</span></div>
 <div>⏱️ <span id="time">10</span>s</div>
</div>

<div id="game">
 <div class="card">
  <h2 id="question"></h2>
  <div id="options"></div>
 </div>
</div>

<div id="gameOver">
 <h2>💥 Game Over</h2>
 <button onclick="restart()">Restart</button>
</div>

<script>
let score=0;
let coins=0;
let time=10;
let level=1;
let gameRunning=true;

let highScore=localStorage.getItem("iqHigh") || 0;
document.getElementById("high").innerText=highScore;

/* TIMER */
function startTimer(){
 let t=setInterval(()=>{
  if(!gameRunning) return clearInterval(t);

  time--;
  document.getElementById("time").innerText=time;

  if(time<=0){
   endGame();
   clearInterval(t);
  }
 },1000);
}

/* RANDOM HARD QUESTION GENERATOR */
function generateQuestion(){
 let type=Math.floor(Math.random()*5);

 let a=rand(1,10*level);
 let b=rand(1,10*level);
 let c=rand(1,10*level);

 let q="", ans=0;

 switch(type){

  case 0: // multi-step
   q=`(${a} × ${b}) + ${c}`;
   ans=(a*b)+c;
   break;

  case 1: // division safe
   ans=a;
   q=`${a*b} ÷ ${b}`;
   break;

  case 2: // power
   a=rand(2,5);
   b=rand(2,3);
   q=`${a}<sup>${b}</sup>`;
   ans=Math.pow(a,b);
   break;

  case 3: // mixed
   q=`${a} + ${b} × ${c}`;
   ans=a + (b*c);
   break;

  case 4: // subtraction trick
   q=`(${a*b}) - ${c}`;
   ans=(a*b)-c;
   break;
 }

 return {q, ans};
}

/* RANDOM HELPER */
function rand(min,max){
 return Math.floor(Math.random()*(max-min+1))+min;
}

/* GENERATE OPTIONS */
function generateOptions(ans){
 let opts=[ans];

 while(opts.length<4){
  let wrong=ans + rand(-10*level,10*level);

  if(wrong!==ans && !opts.includes(wrong)){
   opts.push(wrong);
  }
 }

 return opts.sort(()=>Math.random()-0.5);
}

/* NEW QUESTION */
function newQ(){
 if(!gameRunning) return;

 time=10;
 document.getElementById("time").innerText=time;

 let {q, ans}=generateQuestion();

 document.getElementById("question").innerHTML=q;

 let opts=generateOptions(ans);

 let div=document.getElementById("options");
 div.innerHTML="";

 opts.forEach(o=>{
  let btn=document.createElement("button");
  btn.innerText=o;

  btn.onclick=()=>{
   if(o===ans){
    score++;
    coins++;
    level++;

    document.getElementById("score").innerText=score;
    document.getElementById("coins").innerText=coins;

    newQ();
   } else {
    endGame();
   }
  };

  div.appendChild(btn);
 });
}

/* END GAME */
function endGame(){
 gameRunning=false;

 if(score>highScore){
  localStorage.setItem("iqHigh",score);
 }

 document.getElementById("game").style.display="none";
 document.getElementById("gameOver").style.display="block";
}

/* RESTART */
function restart(){
 location.reload();
}

startTimer();
newQ();
</script>

</body>
</html>
