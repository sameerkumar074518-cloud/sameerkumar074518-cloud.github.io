<!DOCTYPE html>
<html>
<head>
<title>Snake Game</title>

<style>
body {
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}
canvas { border:2px solid white; }
#gameOver { display:none; }

/* 📱 MOBILE CONTROLS */
.controls{
  margin-top:15px;
}
.controls button{
  padding:10px 15px;
  margin:5px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:#ff416c;
  color:white;
}
</style>

</head>

<body>

<h1>🐍 Snake Game</h1>
<h2>🏆 High Score: <span id="highScore">0</span></h2>

<canvas id="game" width="400" height="400"></canvas>

<!-- 📱 MOBILE BUTTON CONTROLS -->
<div class="controls">
  <div>
    <button onclick="changeDir('up')">⬆️</button>
  </div>
  <div>
    <button onclick="changeDir('left')">⬅️</button>
    <button onclick="changeDir('down')">⬇️</button>
    <button onclick="changeDir('right')">➡️</button>
  </div>
</div>

<div id="gameOver">
  <h2 id="finalScore"></h2>
  <button onclick="location.reload()">Restart</button>
</div>

<h3>🏆 Top Snake Players</h3>
<ul id="snakeLeaderboard"></ul>

<script>

// 🔊 SOUND (NO FILES)
function playEatSound(){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  osc.type = "square";
  osc.frequency.value = 600;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(), 100);
}

function playGameOverSound(){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  osc.type = "sawtooth";
  osc.frequency.value = 150;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(), 300);
}

// 💾 SAVE SCORE
function saveScore(game, score){
  let user = localStorage.getItem("username") || "Guest";
  let scores = JSON.parse(localStorage.getItem("scores") || "[]");

  scores.push({
    user: user,
    game: game,
    score: score
  });

  localStorage.setItem("scores", JSON.stringify(scores));
}

// 🏆 LEADERBOARD
function showSnakeLeaderboard(){
  let scores = JSON.parse(localStorage.getItem("scores") || "[]");

  let snakeScores = scores.filter(s => 
    s.game.toLowerCase().includes("snake") && s.score > 0
  );

  snakeScores.sort((a,b)=> b.score - a.score);

  let list = document.getElementById("snakeLeaderboard");
  list.innerHTML = "";

  let medals = ["🥇","🥈","🥉"];

  snakeScores.slice(0,5).forEach((s,index)=>{
    let li = document.createElement("li");
    let medal = medals[index] || "🏅";
    li.innerText = `${medal} ${s.user} - ${s.score}`;
    list.appendChild(li);
  });
}


// 🎮 GAME CODE
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let snake = [{x:200,y:200}];
let food = {x:100,y:100};
let dx=20, dy=0;
let score=0;
let gameRunning=true;

let highScore = localStorage.getItem("snakeHighScore") || 0;
document.getElementById("highScore").innerText = highScore;

/* ⌨️ KEYBOARD */
document.addEventListener("keydown",e=>{
 if(e.key=="ArrowUp" && dy==0){dx=0;dy=-20;}
 if(e.key=="ArrowDown" && dy==0){dx=0;dy=20;}
 if(e.key=="ArrowLeft" && dx==0){dx=-20;dy=0;}
 if(e.key=="ArrowRight" && dx==0){dx=20;dy=0;}
});

/* 📱 BUTTON CONTROL */
function changeDir(dir){
 if(dir=="up" && dy==0){dx=0;dy=-20;}
 if(dir=="down" && dy==0){dx=0;dy=20;}
 if(dir=="left" && dx==0){dx=-20;dy=0;}
 if(dir=="right" && dx==0){dx=20;dy=0;}
}

/* 📱 SWIPE CONTROL */
let startX, startY;

canvas.addEventListener("touchstart",e=>{
 startX = e.touches[0].clientX;
 startY = e.touches[0].clientY;
});

canvas.addEventListener("touchend",e=>{
 let endX = e.changedTouches[0].clientX;
 let endY = e.changedTouches[0].clientY;

 let diffX = endX - startX;
 let diffY = endY - startY;

 if(Math.abs(diffX) > Math.abs(diffY)){
   if(diffX > 0 && dx==0){dx=20;dy=0;}
   else if(dx==0){dx=-20;dy=0;}
 } else {
   if(diffY > 0 && dy==0){dx=0;dy=20;}
   else if(dy==0){dx=0;dy=-20;}
 }
});

function loop(){
 if(!gameRunning) return;

 let head={x:snake[0].x+dx,y:snake[0].y+dy};
 snake.unshift(head);

 if(head.x==food.x && head.y==food.y){
   score++;
   playEatSound(); // 🔊 SOUND
   food={x:Math.floor(Math.random()*20)*20,y:Math.floor(Math.random()*20)*20};
 } else snake.pop();

 if(head.x<0||head.y<0||head.x>=400||head.y>=400||
   snake.slice(1).some(s=>s.x==head.x&&s.y==head.y)){
   endGame();
   return;
 }

 ctx.fillStyle="black";
 ctx.fillRect(0,0,400,400);

 ctx.fillStyle="red";
 ctx.fillRect(food.x,food.y,20,20);

 ctx.fillStyle="lime";
 snake.forEach(s=>ctx.fillRect(s.x,s.y,20,20));
}

function endGame(){
 gameRunning=false;

 if(score>highScore){
   localStorage.setItem("snakeHighScore",score);
 }

 saveScore("Snake", score);

 document.getElementById("gameOver").style.display="block";
 document.getElementById("finalScore").innerText="Score: "+score;

 playGameOverSound(); // 🔊 SOUND
 showSnakeLeaderboard(); // 🏆 LEADERBOARD
}

setInterval(loop,120);
</script>

</body>
</html>
