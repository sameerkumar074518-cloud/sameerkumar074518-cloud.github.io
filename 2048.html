<!DOCTYPE html>
<html>
<head>
<title>2048</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 text-align:center;
 font-family:Poppins;
 background:linear-gradient(135deg,#232526,#414345);
 color:white;
}

h1{margin-top:10px;}

.grid{
 display:grid;
 grid-template-columns:repeat(4,80px);
 gap:10px;
 justify-content:center;
 margin-top:20px;
}

.cell{
 width:80px;height:80px;
 background:#555;
 display:flex;
 justify-content:center;
 align-items:center;
 font-size:22px;
 border-radius:10px;
}

.score{
 margin-top:10px;
}

button{
 margin-top:15px;
 padding:10px 20px;
 border:none;
 border-radius:8px;
 cursor:pointer;
}
</style>

</head>

<body>

<h1>🧩 2048</h1>

<div class="score">
🏆 Score: <span id="score">0</span>
</div>

<div class="grid" id="grid"></div>

<button onclick="restart()">Restart</button>

<script>

let gridArr = new Array(16).fill(0);
let cells = [];
let score = 0;

const grid = document.getElementById("grid");

// CREATE GRID
for(let i=0;i<16;i++){
 let d=document.createElement("div");
 d.className="cell";
 cells.push(d);
 grid.appendChild(d);
}

// ADD RANDOM TILE
function addTile(){
 let empty = gridArr.map((v,i)=>v==0?i:null).filter(v=>v!=null);
 if(empty.length===0) return;
 let r = empty[Math.floor(Math.random()*empty.length)];
 gridArr[r] = Math.random()<0.9 ? 2 : 4;
}

// DRAW
function draw(){
 cells.forEach((c,i)=>{
  c.innerText = gridArr[i] || "";
 });
 document.getElementById("score").innerText = score;
}

// MOVE LOGIC
function slide(row){
 row = row.filter(v=>v);
 for(let i=0;i<row.length-1;i++){
  if(row[i]===row[i+1]){
   row[i]*=2;
   score+=row[i];
   row[i+1]=0;
  }
 }
 row = row.filter(v=>v);
 while(row.length<4) row.push(0);
 return row;
}

function rotate(){
 let newArr = new Array(16).fill(0);
 for(let r=0;r<4;r++){
  for(let c=0;c<4;c++){
   newArr[c*4+(3-r)] = gridArr[r*4+c];
  }
 }
 gridArr = newArr;
}

function moveLeft(){
 for(let r=0;r<4;r++){
  let row = gridArr.slice(r*4,r*4+4);
  row = slide(row);
  for(let i=0;i<4;i++) gridArr[r*4+i]=row[i];
 }
}

// HANDLE KEYS
function handleMove(dir){
 let old = [...gridArr];

 if(dir==="left") moveLeft();
 if(dir==="up"){ rotate(); moveLeft(); rotate(); rotate(); rotate(); }
 if(dir==="right"){ rotate(); rotate(); moveLeft(); rotate(); rotate(); }
 if(dir==="down"){ rotate(); rotate(); rotate(); moveLeft(); rotate(); }

 if(JSON.stringify(old)!==JSON.stringify(gridArr)){
  addTile();
  draw();
  checkGameOver();
 }
}

// GAME OVER
function checkGameOver(){
 if(gridArr.includes(0)) return;

 for(let i=0;i<16;i++){
  let r=Math.floor(i/4), c=i%4;
  if(c<3 && gridArr[i]===gridArr[i+1]) return;
  if(r<3 && gridArr[i]===gridArr[i+4]) return;
 }

 alert("💀 Game Over! Score: "+score);
}

// KEYBOARD
document.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft") handleMove("left");
 if(e.key==="ArrowRight") handleMove("right");
 if(e.key==="ArrowUp") handleMove("up");
 if(e.key==="ArrowDown") handleMove("down");
});

// TOUCH (MOBILE)
let startX=0,startY=0;

document.addEventListener("touchstart",e=>{
 startX=e.touches[0].clientX;
 startY=e.touches[0].clientY;
});

document.addEventListener("touchend",e=>{
 let dx=e.changedTouches[0].clientX-startX;
 let dy=e.changedTouches[0].clientY-startY;

 if(Math.abs(dx)>Math.abs(dy)){
  if(dx>30) handleMove("right");
  if(dx<-30) handleMove("left");
 } else{
  if(dy>30) handleMove("down");
  if(dy<-30) handleMove("up");
 }
});

// RESTART
function restart(){
 gridArr = new Array(16).fill(0);
 score = 0;
 addTile();
 addTile();
 draw();
}

// START
restart();

</script>

</body>
</html>
