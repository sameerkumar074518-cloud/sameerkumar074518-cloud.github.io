<!DOCTYPE html>
<html>
<head>
<title>Slide Puzzle PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:Poppins;
 background:linear-gradient(135deg,#141e30,#243b55);
 color:white;
 text-align:center;
}

h1{margin-top:15px;}

#stats{
 display:flex;
 justify-content:center;
 gap:20px;
 margin:10px;
}

#board{
 width:300px;
 height:300px;
 margin:20px auto;
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:5px;
}

.tile{
 background:#00bcd4;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:24px;
 border-radius:10px;
 cursor:pointer;
 transition:0.2s;
}

.empty{
 background:black;
}

button{
 padding:10px 15px;
 margin:10px;
 border:none;
 border-radius:8px;
 cursor:pointer;
 background:#ff416c;
 color:white;
}

/* WIN ANIMATION */
.win{
 animation:winFlash 0.5s infinite alternate;
}
@keyframes winFlash{
 from{background:#00e676;}
 to{background:#00bcd4;}
}

/* LEADERBOARD */
#leaderboard{
 margin-top:15px;
}
</style>

</head>

<body>

<h1>🧩 Slide Puzzle PRO</h1>

<div id="stats">
 <div>⏱ Time: <span id="time">0</span>s</div>
 <div>🎯 Moves: <span id="moves">0</span></div>
</div>

<div id="board"></div>

<button onclick="shuffle()">🔀 Shuffle</button>
<button onclick="autoSolve()">🧠 Auto Solve</button>

<h2 id="result"></h2>

<div id="leaderboard">
 <h3>🏆 Best Time</h3>
 <p id="best">--</p>
</div>

<script>
let board = document.getElementById("board");
let tiles=[];
let moves=0;
let time=0;
let timer;
let startTime=false;

/* INIT */
function init(){
 tiles=[1,2,3,4,5,6,7,8,0];
 render();
}

function render(){
 board.innerHTML="";
 tiles.forEach((t,i)=>{
  let div=document.createElement("div");
  div.className="tile"+(t===0?" empty":"");
  div.innerText=t===0?"":t;
  div.onclick=()=>move(i);
  board.appendChild(div);
 });
}

/* MOVE */
function move(i){
 let empty=tiles.indexOf(0);
 let valid=[i-1,i+1,i-3,i+3];

 if(valid.includes(empty)){
  [tiles[i],tiles[empty]]=[tiles[empty],tiles[i]];
  moves++;
  document.getElementById("moves").innerText=moves;

  if(!startTime){
   startTimer();
   startTime=true;
  }

  render();
  checkWin();
 }
}

/* TIMER */
function startTimer(){
 timer=setInterval(()=>{
  time++;
  document.getElementById("time").innerText=time;
 },1000);
}

/* SHUFFLE */
function shuffle(){
 for(let i=0;i<50;i++){
  let rand=Math.floor(Math.random()*9);
  move(rand);
 }
 moves=0;
 time=0;
 startTime=false;
 clearInterval(timer);
 document.getElementById("moves").innerText=0;
 document.getElementById("time").innerText=0;
}

/* WIN */
function checkWin(){
 if(tiles.join()==="1,2,3,4,5,6,7,8,0"){
  clearInterval(timer);
  document.getElementById("result").innerText="🎉 You Win!";
  
  document.querySelectorAll(".tile").forEach(t=>t.classList.add("win"));

  let best=localStorage.getItem("puzzleBest");
  if(!best || time<best){
   localStorage.setItem("puzzleBest",time);
   document.getElementById("best").innerText=time+"s";
  }
 }
}

/* LOAD BEST */
document.getElementById("best").innerText=
 localStorage.getItem("puzzleBest") || "--";

/* AI SOLVER (basic smart shuffle back) */
function autoSolve(){
 tiles=[1,2,3,4,5,6,7,8,0];
 render();
}

/* MOBILE SWIPE */
let startX=0, startY=0;

board.addEventListener("touchstart",e=>{
 startX=e.touches[0].clientX;
 startY=e.touches[0].clientY;
});

board.addEventListener("touchend",e=>{
 let dx=e.changedTouches[0].clientX - startX;
 let dy=e.changedTouches[0].clientY - startY;

 let empty=tiles.indexOf(0);

 if(Math.abs(dx)>Math.abs(dy)){
  if(dx>30) move(empty-1); // right swipe
  else if(dx<-30) move(empty+1);
 } else {
  if(dy>30) move(empty-3);
  else if(dy<-30) move(empty+3);
 }
});

/* START */
init();
</script>

</body>
</html>
